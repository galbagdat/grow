<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tumar Family Academy — Launch Control</title>
<meta name="description" content="Центр управления запуском образовательной программы Tumar Family Academy для наследников UHNW-семей Центральной Азии.">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --navy:#0e1b33; --navy2:#1F3864; --ink:#14213a;
  --bronze:#B88A3E; --bronze-d:#8f6a2c; --bronze-l:#d9b873;
  --ivory:#f6f1e7; --ivory2:#efe7d6; --paper:#fbf8f1;
  --card:#ffffff; --line:#e6dcc6; --line2:#d8cbb0;
  --muted:#736b58; --muted2:#9a917c;
  --red:#a8493f; --redbg:#f7e9e6;
  --green:#3f7d5a; --greenbg:#e7f0ea;
  --amber:#c08a2c; --amberbg:#f7eed9;
  --display:'Cormorant Garamond',Georgia,serif;
  --body:'Manrope',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Spline Sans Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--ivory);color:var(--ink);line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}
.side{width:248px;background:var(--navy);color:#e8e2d4;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;border-right:1px solid #000}
.brand{padding:24px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand .kicker{font-size:10px;letter-spacing:.22em;color:var(--bronze-l);text-transform:uppercase;font-weight:600}
.brand h1{font-family:var(--display);font-size:27px;font-weight:600;color:#fff;line-height:1.05;margin-top:7px}
.brand .sub{font-size:11px;color:#9aa6bd;margin-top:6px;letter-spacing:.02em}
.nav{padding:12px 12px 30px}
.nav button{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;color:#bcc5d8;font-family:var(--body);font-size:13.5px;font-weight:500;text-align:left;padding:10px 12px;border-radius:9px;cursor:pointer;transition:.15s;margin-bottom:2px}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.on{background:linear-gradient(90deg,rgba(184,138,62,.22),rgba(184,138,62,.05));color:#fff;box-shadow:inset 2px 0 0 var(--bronze)}
.nav .ico{width:18px;text-align:center;font-size:14px;flex-shrink:0;opacity:.9}
.nav .grouplbl{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#6b7691;padding:16px 12px 6px;font-weight:600}
.main{flex:1;min-width:0}
.topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:13px 34px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;backdrop-filter:blur(6px);gap:14px}
.topbar .ttl{font-family:var(--display);font-size:25px;font-weight:600;color:var(--navy)}
.topbar .meta{font-size:12px;color:var(--muted)}
.topright{display:flex;align-items:center;gap:14px}
.lang{display:flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
.lang button{border:none;background:#fff;color:var(--muted);font-family:var(--body);font-weight:700;font-size:12px;padding:6px 12px;cursor:pointer;letter-spacing:.05em}
.lang button.on{background:var(--navy);color:#fff}
.wrap{padding:30px 34px 70px;max-width:1180px}
h2.sec{font-family:var(--display);font-size:23px;color:var(--navy);font-weight:600;margin:6px 0 4px}
.lead{color:var(--muted);font-size:14px;max-width:760px;margin-bottom:22px}
.eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze-d);font-weight:700;margin-bottom:9px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 1px 2px rgba(20,33,58,.03)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1000px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bronze)}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.kpi .val{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--navy);margin-top:7px;line-height:1}
.kpi .val small{font-size:14px;color:var(--muted2)}
.kpi .note{font-size:11.5px;color:var(--muted2);margin-top:6px}
.kpi.warn::before{background:var(--red)}.kpi.ok::before{background:var(--green)}
.bar{height:9px;background:var(--ivory2);border-radius:6px;overflow:hidden;margin-top:9px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--bronze),var(--bronze-l));border-radius:6px;transition:width .5s}
.bar.nv i{background:linear-gradient(90deg,var(--navy2),#3a5e8c)}
.bdg{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em}
.bdg.todo{background:var(--ivory2);color:var(--muted)}.bdg.prog{background:var(--amberbg);color:var(--amber)}.bdg.done{background:var(--greenbg);color:var(--green)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:10px 12px;border-bottom:2px solid var(--line2);background:var(--paper)}
td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
.num{font-family:var(--mono);text-align:right}
.tbl-wrap{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden}
.role{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden}
.role .hd{padding:20px 22px;color:#fff;position:relative}
.role.founder .hd{background:linear-gradient(135deg,var(--navy),var(--navy2))}
.role.lead .hd{background:linear-gradient(135deg,#5a4520,var(--bronze-d))}
.role.pm .hd{background:linear-gradient(135deg,#2c4a4a,#3f6d63)}
.role .av{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:21px;font-weight:600;border:1.5px solid rgba(255,255,255,.4)}
.role .nm{font-family:var(--display);font-size:21px;font-weight:600;margin-top:11px}
.role .rl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.82;margin-top:2px;font-weight:600}
.role .bd{padding:18px 22px}
.role .bd .h{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--bronze-d);font-weight:700;margin:4px 0 8px}
.role ul{list-style:none;margin-bottom:14px}
.role li{font-size:13px;padding:5px 0 5px 18px;position:relative;color:var(--ink)}
.role li::before{content:'';position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%;background:var(--bronze)}
.flight{position:relative;padding:30px 10px 10px;overflow-x:auto}
.flight-line{display:flex;min-width:760px;position:relative}
.fp-spine{position:absolute;top:46px;left:6%;right:6%;height:2px;background:repeating-linear-gradient(90deg,var(--bronze) 0 10px,transparent 10px 18px)}
.station{flex:1;position:relative;text-align:center;z-index:2}
.station .pin{width:54px;height:54px;border-radius:50%;background:var(--card);border:2px solid var(--bronze);display:flex;align-items:center;justify-content:center;font-size:22px;margin:18px auto 12px;box-shadow:0 3px 10px rgba(20,33,58,.1)}
.station.clash .pin{border-color:var(--red);background:var(--redbg)}
.station .mn{font-family:var(--display);font-size:17px;font-weight:600;color:var(--navy)}
.station .ct{font-size:12px;color:var(--bronze-d);font-weight:600;margin-top:1px}
.station .dt{font-size:11px;color:var(--muted);margin-top:3px}
.station .tp{font-size:11px;color:var(--muted2);margin-top:5px;max-width:140px;margin:5px auto 0}
.cal-yr{font-family:var(--display);font-size:20px;color:var(--bronze-d);font-weight:600;margin:24px 0 12px;display:flex;align-items:center;gap:12px}
.cal-yr::after{content:'';flex:1;height:1px;background:var(--line2)}
.cmonth{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 15px;border-left:3px solid var(--line2)}
.cmonth.mod{border-left-color:var(--bronze);background:linear-gradient(180deg,#fff,#fdf9f0)}
.cmonth.clash{border-left-color:var(--red)}
.cmonth .mo{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
.cmonth .ev{font-size:12.5px;margin-top:7px;color:var(--ink);padding-left:14px;position:relative;line-height:1.35}
.cmonth .ev::before{content:'›';position:absolute;left:0;color:var(--bronze);font-weight:700}
.cmonth .ev.hi{font-weight:700;color:var(--navy)}
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
@media(max-width:820px){.cal-grid{grid-template-columns:repeat(2,1fr)}}
input[type=text],input[type=number],input[type=tel],select,textarea{font-family:var(--body);font-size:13.5px;border:1px solid var(--line2);border-radius:8px;padding:8px 11px;background:#fff;color:var(--ink);width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bronze)}
select{cursor:pointer}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;margin-bottom:5px}
.btn{font-family:var(--body);font-weight:600;font-size:13px;border:none;border-radius:9px;padding:10px 16px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn.pri{background:var(--navy);color:#fff}.btn.pri:hover{background:var(--navy2)}
.btn.wa{background:#25D366;color:#063}.btn.wa:hover{filter:brightness(.95)}
.btn.gh{background:none;border:1px solid var(--line2);color:var(--muted)}.btn.gh:hover{border-color:var(--bronze);color:var(--bronze-d)}
.btn.sm{padding:6px 11px;font-size:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:20px;border:1px solid var(--line2);background:#fff;color:var(--muted);cursor:pointer;transition:.15s}
.chip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.persona{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.persona .hd{padding:20px 22px;background:linear-gradient(135deg,var(--ink),var(--navy2));color:#fff}
.persona.ng .hd{background:linear-gradient(135deg,#4a3a1c,var(--bronze-d))}
.persona .tag{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;opacity:.8;font-weight:600}
.persona .nm{font-family:var(--display);font-size:23px;font-weight:600;margin-top:4px}
.persona .age{font-size:12.5px;opacity:.85;margin-top:2px}
.persona .bd{padding:18px 22px}
.persona .row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.persona .row:last-child{border:none}
.persona .row .k{font-weight:700;color:var(--bronze-d);min-width:118px;flex-shrink:0;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;padding-top:1px}
.persona .row .v{color:var(--ink)}
.doc{display:flex;align-items:center;gap:13px;padding:12px 15px;border:1px solid var(--line);border-radius:11px;background:#fff;margin-bottom:9px}
.doc .ic{width:38px;height:38px;border-radius:9px;background:var(--ivory2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc .info{flex:1;min-width:0}
.doc .dn{font-weight:600;font-size:13.5px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc .dm{font-size:11.5px;color:var(--muted2);margin-top:2px}
.catbar{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 18px}
.log{font-size:12.5px;border-left:2px solid var(--line2);padding:9px 0 9px 14px;margin-bottom:3px;position:relative}
.log::before{content:'';position:absolute;left:-5px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--bronze)}
.log .lt{font-size:10.5px;color:var(--muted2);font-family:var(--mono)}
.callout{background:linear-gradient(135deg,#fdf6e8,#f9efd8);border:1px solid var(--line2);border-left:3px solid var(--bronze);border-radius:11px;padding:16px 18px;margin:16px 0;font-size:13.5px}
.callout.red{background:var(--redbg);border-left-color:var(--red)}
.callout.blue{background:#eef3f9;border-left-color:var(--navy2)}
.callout b{color:var(--navy)}
.src{font-size:11px;color:var(--muted2);font-style:italic;margin-top:10px}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.split{grid-template-columns:1fr}}
.mini{font-size:11.5px;color:var(--muted)}
.inline-edit{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:12px;background:var(--ivory2);padding:2px 8px;border-radius:6px;color:var(--navy)}
.tr-flag{font-size:10px;color:var(--bronze-d);font-style:italic;margin-left:6px}
.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--line2);border-top-color:var(--bronze);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px}
@keyframes sp{to{transform:rotate(360deg)}}
.hidden{display:none!important}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){.side{position:fixed;left:-260px;transition:.25s;z-index:60}.side.open{left:0}.wrap{padding:20px 16px 60px}.topbar{padding:12px 16px}.menu-btn{display:flex!important}.topbar .ttl{font-size:20px}}
.menu-btn{display:none;background:var(--navy);color:#fff;border:none;width:36px;height:36px;border-radius:9px;font-size:17px;cursor:pointer;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <div class="kicker">Tumar Family Office</div>
      <h1>Family<br>Academy</h1>
      <div class="sub" id="brandSub">Центр управления запуском · 2026–2028</div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:13px;min-width:0">
        <button class="menu-btn" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <div class="ttl" id="viewTitle">Обзор</div>
      </div>
      <div class="topright">
        <div class="meta" id="topMeta"></div>
        <div class="lang"><button id="lru" onclick="setLang('ru')">RU</button><button id="len" onclick="setLang('en')">EN</button></div>
      </div>
    </div>
    <div class="wrap" id="wrap"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============ STORE ============ */
const KEY='tumar_launch_v2';
const mem={};
const store={
  get(k,d){try{const v=localStorage.getItem(KEY+':'+k);return v==null?(k in mem?mem[k]:d):JSON.parse(v)}catch(e){return k in mem?mem[k]:d}},
  set(k,v){mem[k]=v;try{localStorage.setItem(KEY+':'+k,JSON.stringify(v))}catch(e){}}
};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmt=n=>'$'+Math.round(n).toLocaleString('en-US');

/* ============ LANG ============ */
let LANG=store.get('lang','ru');
const L=(ru,en)=>({ru,en});
function T(x){if(x&&typeof x==='object'&&('ru' in x||'en' in x))return x[LANG]??x.ru??x.en??'';return x}
function setLang(l){LANG=l;store.set('lang',l);document.documentElement.lang=l;syncLangUI();buildNav();$('#viewTitle').textContent=T(UI[CUR]);render()}
function syncLangUI(){$('#lru').classList.toggle('on',LANG==='ru');$('#len').classList.toggle('on',LANG==='en');$('#brandSub').textContent=T(L('Центр управления запуском · 2026–2028','Launch control center · 2026–2028'))}

/* ============ AI TRANSLATION ============ */
async function aiTranslate(text,target){
  // target: 'ru' | 'en'. Returns translated string or null if unavailable.
  const tgt=target==='ru'?'Russian':'English';
  try{
    const ctrl=new Promise((_,rej)=>setTimeout(()=>rej('timeout'),9000));
    const req=fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
        messages:[{role:'user',content:'You are translating short project-management entries for a family-office education programme. Translate the text below into '+tgt+'. Keep proper names, brand names and city names natural. Return ONLY the translation as plain text — no quotes, no notes.\n\n'+text}]})});
    const r=await Promise.race([req,ctrl]);
    const d=await r.json();
    const out=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    return out||null;
  }catch(e){return null}
}

/* ============ DATA ============ */
const MODULES=[
  {n:L('Модуль 1','Module 1'),city:L('Дубай · DIFC','Dubai · DIFC'),date:L('20–21 сент 2026','20–21 Sep 2026'),ico:'🏙️',topic:L('Семейное управление и архитектура капитала','Family governance & capital architecture'),low:97100,base:149600,high:226600},
  {n:L('Модуль 2','Module 2'),city:L('Сингапур','Singapore'),date:L('8–9 ноя 2026','8–9 Nov 2026'),ico:'🌃',topic:L('Преемственность и операционное лидерство','Succession & operating leadership'),low:79800,base:127100,high:196350,clash:true},
  {n:L('Модуль 3','Module 3'),city:L('Цюрих / Женева','Zurich / Geneva'),date:L('1–2 ноя 2026','1–2 Nov 2026'),ico:'🏔️',topic:L('Психология, коммуникация, семейная динамика','Psychology, communication, family dynamics'),low:90250,base:140250,high:214500,clash:true},
  {n:L('Модуль 4','Module 4'),city:L('Палм-Бич · FOX','Palm Beach · FOX'),date:L('март 2027','March 2027'),ico:'🌴',topic:L('Международный обмен в стиле FOX (финал)','FOX-style international exchange (finale)'),low:185350,base:284900,high:426250}
];
const PROG_TOTAL={low:452500,base:701850,high:1063700,contingency:807000,optionB:630900,maxAdverse:899000};
const SENS=[
  [L('База — Вариант A (FOX, Палм-Бич)','Base — Option A (FOX, Palm Beach)'),701850,'—',L('RFP успешны, нет накладок по датам','RFPs successful, no date clashes')],
  [L('База — Вариант B (Нью-Йорк)','Base — Option B (New York)'),630900,'−$71K',L('Без сборов FOX, вся кураторская нагрузка на Tumar','No FOX fees; full curation burden on Tumar')],
  [L('+15% инфляция по отелям','+15% hotel inflation'),757850,'+$56K',L('Все ставки на 15% выше бенчмарков июня 2026','All rates 15% above June 2026 benchmarks')],

/* ============ HELPERS ============ */
function overallPct(){return Math.round(TASKS.reduce((a,t)=>a+t.pct,0)/TASKS.length)}
function ownerPct(o){const ts=TASKS.filter(t=>t.o===o);return ts.length?Math.round(ts.reduce((a,t)=>a+t.pct,0)/ts.length):0}
function daysTo(d){return Math.ceil((new Date(d)-new Date())/864e5)}
function statusOf(p){return p>=100?'done':p>0?'prog':'todo'}
function statusLbl(p){return p>=100?T(L('Готово','Done')):p>0?T(L('В работе','In progress')):T(L('Не начато','Not started'))}
function overdue(t){return t.pct<100&&daysTo(t.due)<0}
function tt(x){return T(x)} // task/doc text holder accessor

  const name=$('#ntName').value.trim();if(!name){toast(T(L('Введите текст задачи','Enter task text')));return}

  const t={id:++TASK_SEQ,t:{ru:name,en:name},o:$('#ntOwner').value,ph:0,due:$('#ntDue').value||'2026-08-01',pct:0,_tr:true};

async function addDoc(){
  const n=$('#dn').value.trim();if(!n){toast(T(L('Введите название','Enter a name')));return}
  const other=LANG==='ru'?'en':'ru';
  const d={id:++DOC_SEQ,name:{ru:n,en:n},cat:$('#dc').value,link:$('#dl').value.trim(),meta:L('добавлено '+new Date().toLocaleDateString('ru-RU'),'added '+new Date().toLocaleDateString('en-GB')),_tr:true};
  d.name[LANG]=n;d.name[other]=n;
  DOCS.unshift(d);store.set('docs',DOCS);store.set('docseq',DOC_SEQ);$('#dn').value='';$('#dl').value='';render();
  const tr=await aiTranslate(n,other);
  const ref=DOCS.find(x=>x.id===d.id);if(ref){if(tr)ref.name[other]=tr;ref._tr=false;store.set('docs',DOCS);if(CUR==='docs')render();toast(tr?T(L('Документ добавлен и переведён','Document added and translated')):T(L('Документ добавлен','Document added')))}
}
function attachFile(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>1.5*1024*1024){toast(T(L('Файл больше 1,5 МБ — добавьте ссылкой','File over 1.5 MB — add by link')));return}
  const rd=new FileReader();const other=LANG==='ru'?'en':'ru';
  rd.onload=async()=>{const d={id:++DOC_SEQ,name:{ru:f.name,en:f.name},cat:$('#dc').value,data:rd.result,meta:L((f.size/1024).toFixed(0)+' КБ · вложение',(f.size/1024).toFixed(0)+' KB · attachment'),_tr:true};DOCS.unshift(d);store.set('docs',DOCS);store.set('docseq',DOC_SEQ);render();const tr=await aiTranslate(f.name,other);const ref=DOCS.find(x=>x.id===d.id);if(ref){if(tr)ref.name[other]=tr;ref._tr=false;store.set('docs',DOCS);if(CUR==='docs')render()}toast(T(L('Файл прикреплён','File attached')))};
  rd.readAsDataURL(f);
}
function delDoc(id){DOCS=DOCS.filter(d=>d.id!==id);store.set('docs',DOCS);render()}

    </div>
  </div>
  <div class="callout"><b>${T(L('Как это работает.','How it works.'))}</b> ${T(L('Приложение готовит текст и открывает WhatsApp с заполненным сообщением (через wa.me). Для авто-напоминаний по расписанию нужен WhatsApp Business API (Twilio / 360dialog) и сервер — это следующий шаг.','The app prepares the text and opens WhatsApp with the message pre-filled (via wa.me). Scheduled auto-reminders require the WhatsApp Business API (Twilio / 360dialog) and a server — that\'s the next step.'))}</div>`;
}
function saveContact(k,v){CONTACTS[k]=v;store.set('contacts',CONTACTS)}
function fillTpl(){
  if(CUR!=='notify')return;
  const tpl=$('#ntpl').value, toK=$('#nto').value, to=T(TEAM[toK].name);
  const t=TASKS.find(x=>x.id===+($('#ntask')?.value))||TASKS[0];
  if($('#taskPick'))$('#taskPick').style.display=(tpl==='task'||tpl==='deadline')?'block':'none';
  let m='';const txt=T(t.t);
  if(LANG==='ru'){
    if(tpl==='task')m=`${to}, привет! Назначаю задачу по запуску Tumar Family Academy:\n\n• ${txt}\nСрок: ${t.due}\nФаза: ${T(PHASES[t.ph])}\n\nОтметь, пожалуйста, статус в трекере. Спасибо!`;
    else if(tpl==='deadline')m=`${to}, напоминание: срок по задаче «${txt}» — ${t.due}. Текущая готовность: ${t.pct}%. Что нужно, чтобы закрыть? 🙏`;
    else if(tpl==='status')m=`Команда, еженедельный статус Tumar Family Academy:\n\nОбщая готовность: ${overallPct()}%\nГалия: ${ownerPct('galiya')}% · Алишер: ${ownerPct('alisher')}% · Бруна: ${ownerPct('bruna')}%\nПросрочено задач: ${TASKS.filter(overdue).length}\nДней до Модуля 1 (Дубай): ${daysTo('2026-09-20')}\n\nФокус недели — закрыть критические блокеры.`;
    else if(tpl==='rfp')m=`${to}, по RFP отелей:\n\nСтатус сбора: ${store.get('rfp',0)}/4 локаций.\nЗакрыть: Дубай (One&Only / FS DIFC), Сингапур (Raffles — проверить даты FinTech Festival), Цюрих (Baur au Lac), Палм-Бич (Breakers).\nКонференц-залы — ключевая переменная бюджета, запросить тарифы отдельно. Спасибо!`;
  }else{
    if(tpl==='task')m=`Hi ${to}! Assigning a Tumar Family Academy launch task:\n\n• ${txt}\nDue: ${t.due}\nPhase: ${T(PHASES[t.ph])}\n\nPlease mark the status in the tracker. Thanks!`;
    else if(tpl==='deadline')m=`${to}, reminder: the task "${txt}" is due ${t.due}. Current progress: ${t.pct}%. What do you need to close it? 🙏`;
    else if(tpl==='status')m=`Team, weekly status for Tumar Family Academy:\n\nOverall readiness: ${overallPct()}%\nGaliya: ${ownerPct('galiya')}% · Alisher: ${ownerPct('alisher')}% · Bruna: ${ownerPct('bruna')}%\nOverdue tasks: ${TASKS.filter(overdue).length}\nDays to Module 1 (Dubai): ${daysTo('2026-09-20')}\n\nFocus of the week — close the critical blockers.`;
    else if(tpl==='rfp')m=`${to}, on the hotel RFPs:\n\nCollected: ${store.get('rfp',0)}/4 locations.\nTo close: Dubai (One&Only / FS DIFC), Singapore (Raffles — check FinTech Festival dates), Zurich (Baur au Lac), Palm Beach (Breakers).\nConference rooms are the key budget variable — request day-rates separately. Thanks!`;
  }
  if($('#nmsg'))$('#nmsg').value=m;
}
function sendWA(){
  const k=$('#nto').value, ph=(CONTACTS[k]||'').replace(/[^\d]/g,''), msg=$('#nmsg').value.trim();
  if(!msg){toast(T(L('Введите текст','Enter a message')));return}
  window.open('https://wa.me/'+ph+'?text='+encodeURIComponent(msg),'_blank');
  NLOG.unshift({time:new Date().toLocaleString(LANG==='ru'?'ru-RU':'en-GB',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}),to:k,preview:msg.slice(0,70)+(msg.length>70?'…':'')});
  store.set('nlog',NLOG);render();
}
function copyMsg(){const m=$('#nmsg').value;navigator.clipboard?.writeText(m).then(()=>toast(T(L('Текст скопирован','Text copied'))),()=>toast(T(L('Не удалось скопировать','Copy failed'))))}

/* ============ INIT ============ */
document.documentElement.lang=LANG;
syncLangUI();buildNav();go('overview');

</script>
