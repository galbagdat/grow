<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICU Kazakhstan &amp; Central Asia — Расписание 2026/27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --teal-900:#0B3B3C;
  --teal-800:#0F4C4D;
  --teal-700:#146568;
  --teal-100:#E7F0EF;
  --gold:#C9A227;
  --gold-light:#E4C874;
  --bg:#FAF8F3;
  --card:#FFFFFF;
  --ink:#1B2426;
  --muted:#5B6B6C;
  --line:#E5DFCF;
  --danger:#B3452F;
  --ok:#3C7A5D;
  --warn:#C9772A;
  --radius:14px;
  --shadow:0 6px 24px rgba(11,59,60,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
html{background:var(--bg);}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter',Arial,sans-serif;
  font-size:14.5px;
  line-height:1.5;
}
button{outline:none;-webkit-tap-highlight-color:transparent;}
button:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
a{text-decoration:none;}
.btn, a.btn{text-decoration:none;display:inline-block;}
h1,h2,h3,h4{font-family:'Manrope','Arial',sans-serif;margin:0 0 6px 0;color:var(--teal-900);}
h1{font-size:26px;font-weight:800;}
h2{font-size:20px;font-weight:800;}
h3{font-size:16px;font-weight:700;}
p{margin:0 0 8px 0;}
a{color:var(--teal-700);}
button, .btn{
  font-family:inherit;cursor:pointer;border:none;border-radius:10px;
  padding:9px 16px;font-size:14px;font-weight:600;transition:.15s;
}
.btn-primary{background:var(--teal-900);color:#fff;}
.btn-primary:hover{background:var(--teal-800);}
.btn-gold{background:var(--gold);color:var(--teal-900);}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--teal-900);border:1px solid var(--line);}
.btn-ghost:hover{background:var(--teal-100);}
.btn-sm{padding:5px 10px;font-size:12.5px;border-radius:8px;}
.btn-danger{background:#fbe9e4;color:var(--danger);}
input,select,textarea{
  font-family:inherit;font-size:14px;padding:8px 10px;border-radius:8px;
  border:1px solid var(--line);background:#fff;color:var(--ink);width:100%;
  outline:none;box-shadow:none;-webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--teal-700);
  box-shadow:0 0 0 3px rgba(20,101,104,0.15);
}
input:disabled,select:disabled,textarea:disabled{
  background:#F1EFE6;color:var(--muted);border-color:var(--line);cursor:not-allowed;-webkit-text-fill-color:var(--muted);opacity:1;
}
select{
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0 Z' fill='%23146568'/></svg>");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:30px;
}
select:disabled{
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0 Z' fill='%235B6B6C'/></svg>");
}
::selection{background:var(--gold-light);color:var(--teal-900);}
label{font-size:12.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}

/* layout */
#app{display:flex;min-height:100vh;}
#sidebar{
  width:230px;flex:0 0 230px;background:var(--teal-900);color:#fff;
  display:flex;flex-direction:column;padding:20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;
}
#sidebar .brand{padding:0 20px 18px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:10px;}
#sidebar .brand .tag{color:var(--gold);font-weight:800;font-size:12px;letter-spacing:2px;}
#sidebar .brand h1{color:#fff;font-size:19px;margin-top:4px;}
#sidebar .brand .sub{color:#9FC1C0;font-size:11.5px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:11px 20px;color:#CFE3E3;
  font-weight:600;font-size:13.5px;cursor:pointer;border-left:3px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.09);color:#fff;border-left-color:var(--gold);}
.nav-item .ic{width:18px;text-align:center;}
#sidebar .role-box{margin-top:auto;padding:14px 20px 4px 20px;border-top:1px solid rgba(255,255,255,.12);font-size:11.5px;color:#9FC1C0;}
#sidebar .role-box b{color:#fff;}
#sidebar .role-box .switch{margin-top:8px;color:var(--gold-light);cursor:pointer;font-weight:700;}

#main{flex:1;min-width:0;padding:28px 34px 60px 34px;}
.topbar{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.topbar .meta{color:var(--muted);font-size:13px;}

.tab{display:none;}
.tab.active{display:block;}

.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:720px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}#sidebar{position:fixed;z-index:50;transform:translateX(-100%);transition:.2s;}#sidebar.open{transform:translateX(0);}#main{padding:20px 16px 60px 16px;}}

.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;border:1px solid var(--line);}
.stat{display:flex;flex-direction:column;gap:4px;}
.stat .num{font-family:'Manrope',sans-serif;font-size:30px;font-weight:800;color:var(--teal-900);}
.stat .lbl{font-size:12.5px;color:var(--muted);font-weight:600;}
.stat .sub{font-size:11.5px;color:var(--gold);font-weight:700;}

.section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:var(--teal-100);color:var(--teal-900);text-align:left;padding:9px 10px;font-weight:700;font-size:12.5px;text-transform:uppercase;letter-spacing:.3px;}
td{padding:8px 10px;border-bottom:1px solid var(--line);}
tr:hover td{background:#FBFAF6;}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--line);}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
.badge-teal{background:var(--teal-100);color:var(--teal-800);}
.badge-gold{background:#FBF1D6;color:#8A6D14;}
.badge-ok{background:#E3F1E9;color:var(--ok);}
.badge-warn{background:#FCEBDA;color:var(--warn);}
.badge-danger{background:#FBE9E4;color:var(--danger);}

.progress{height:8px;border-radius:6px;background:var(--teal-100);overflow:hidden;}
.progress > div{height:100%;background:linear-gradient(90deg,var(--teal-700),var(--gold));}

.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:end;}
.filter-row > div{min-width:150px;}

.modal-overlay{position:fixed;inset:0;background:rgba(11,20,20,.55);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:#fff;border-radius:16px;padding:30px;max-width:440px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h2{margin-bottom:6px;}
.modal .muted{color:var(--muted);font-size:13px;margin-bottom:18px;}
.role-opt{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.role-opt:hover{border-color:var(--teal-700);background:var(--teal-100);}
.role-opt.selected{border-color:var(--gold);background:#FBF1D6;}

.hint{background:var(--teal-100);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--teal-800);margin-bottom:14px;}
.warn-box{background:#FCEBDA;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#8A5A1E;margin-bottom:14px;}

.chip{display:inline-flex;align-items:center;gap:6px;background:var(--teal-100);color:var(--teal-800);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;margin:2px;}
.trainer-card{display:flex;flex-direction:column;gap:6px;}
.trainer-card .avatar{width:44px;height:44px;border-radius:50%;background:var(--teal-900);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:Manrope;font-size:15px;}

.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.mt{margin-top:14px;}
.mb{margin-bottom:14px;}
textarea{min-height:90px;resize:vertical;}
.small{font-size:12px;color:var(--muted);}
.close-x{cursor:pointer;color:var(--muted);font-weight:700;font-size:18px;}
.icon-btn{background:transparent;border:1px solid var(--line);border-radius:8px;padding:6px 8px;}
.recipient-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;}
.pill-toggle{display:flex;gap:6px;flex-wrap:wrap;}
.pill{padding:5px 12px;border-radius:20px;border:1px solid var(--line);font-size:12.5px;font-weight:600;cursor:pointer;}
.pill.active{background:var(--teal-900);color:#fff;border-color:var(--teal-900);}
footer.appfoot{margin-top:30px;color:var(--muted);font-size:11.5px;text-align:center;}

.cal-toggle{margin-bottom:14px;}
.cal-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:16px;}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.cal-legend-dot{width:9px;height:9px;border-radius:50%;flex:none;display:inline-block;}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:24px;}
.cal-month{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);}
.cal-month h4{margin:0 0 8px 0;font-size:13.5px;text-transform:capitalize;}
.cal-7col{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-wd{font-size:10px;color:var(--muted);text-align:center;font-weight:700;padding-bottom:3px;}
.cal-day{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10.5px;border-radius:5px;color:var(--ink);background:var(--bg);}
.cal-day.empty{visibility:hidden;}
.cal-day .dots{position:absolute;bottom:1px;left:1px;right:1px;display:flex;gap:1px;justify-content:center;}
.cal-day .dot{width:5px;height:5px;border-radius:50%;flex:none;}

</style>
</head>

</div>

<script>

//
// QR Code Generator for JavaScript

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);

/* ================= STATE (localStorage) ================= */
const LS_KEY = "icu2026_state_v1";
function loadState(){
  let raw = null;
  try { raw = JSON.parse(localStorage.getItem(LS_KEY)); } catch(e){ raw = null; }
  if(!raw){
    raw = {
      cities: {},           // key -> {rep_name, rep_phone, rep_email, notes}
      students: [],         // {id, city, name, phone, email, status, progress:[8 bool]}
      adminPin: DEFAULT_PIN,
      modulePrice: MODULE_PRICE_DEFAULT,
      attendance: {},        // "cityKey_module" -> {studentId: true/false}
      feedback: [],          // {id, city, name, module, rating, comment, date}
      msgTemplates: {
        whatsapp: "Здравствуйте, {name}! Напоминаем: старт модуля ICU в городе {city} — {date}. Тренер: {trainer}. Ждём вас!",
        email: "Здравствуйте, {name}!\n\nНапоминаем о старте модуля программы сертификации ICU в городе {city}.\nДаты: {date}\nТренер: {trainer}\n\nДо встречи!\nICU Kazakhstan & Central Asia"
      }
    };
    CITIES_DEFAULT.forEach(c => raw.cities[c.key] = {rep_name:"", rep_phone:"", rep_email:"", notes:""});
    saveState(raw);
  }
  // backfill any missing cities (in case of future changes)
  CITIES_DEFAULT.forEach(c => { if(!raw.cities[c.key]) raw.cities[c.key] = {rep_name:"",rep_phone:"",rep_email:"",notes:""}; });
  if(!raw.msgTemplates) raw.msgTemplates = {
    whatsapp: "Здравствуйте, {name}! Напоминаем: старт модуля ICU в городе {city} — {date}. Тренер: {trainer}. Ждём вас!",
    email: "Здравствуйте, {name}!\n\nНапоминаем о старте модуля программы сертификации ICU в городе {city}.\nДаты: {date}\nТренер: {trainer}\n\nДо встречи!\nICU Kazakhstan & Central Asia"
  };
  if(typeof raw.modulePrice !== 'number') raw.modulePrice = MODULE_PRICE_DEFAULT;
  if(!raw.attendance) raw.attendance = {};
  if(!raw.feedback) raw.feedback = [];
  return raw;
}
function saveState(s){ localStorage.setItem(LS_KEY, JSON.stringify(s)); }

/* ================= UTIL ================= */
function uid(){ return 'id' + Math.random().toString(36).slice(2,10); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function digitsOnly(s){ return (s||'').replace(/[^0-9]/g,''); }
function fillTemplate(tpl, vars){
  return tpl.replace(/\{(\w+)\}/g, (m,k) => vars[k]!=null ? vars[k] : m);
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function downloadBlob(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function downloadB64(filename, b64, mime){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  downloadBlob(filename, arr, mime);
}

function switchTab(tab){
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.tab===tab));
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.id==='tab-'+tab));
  window.scrollTo(0,0);
  RENDERERS[tab] && RENDERERS[tab]();
  try{ localStorage.setItem('icu2026_lasttab', tab); }catch(e){}
}

  const el = document.getElementById('tab-dashboard');

      <h3>Ближайшие модули</h3>

        </table>

function fmtISO(d){
  const dt = new Date(d+"T00:00:00");
  const months=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
  return dt.getDate()+" "+months[dt.getMonth()]+" "+dt.getFullYear();
}

      <div><label>Модуль</label><select id="fltModule"><option value="">Все модули</option>${[1,2,3,4,5,6,7,8].map(m=>`<option value="${m}">Модуль ${m}</option>`).join('')}</select></div>
    </div>`}
    <div class="tbl-wrap">
      <table id="scheduleTable">
        <thead><tr><th>Город</th><th>Сессия</th><th>Даты</th><th>День недели</th><th>Тренер</th><th>Статус</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  `;
  function renderRows(){
    let rows;
    if(isTrainer){
      rows = SCHEDULE.filter(s => s.trainer===ROLE.trainerName);
    } else {
      const fc = document.getElementById('fltCity').value;
      const ft = document.getElementById('fltTrainer').value;
      const fm = document.getElementById('fltModule').value;
      rows = SCHEDULE.filter(s =>
        (!fc || s.city===fc) && (!ft || s.trainer===ft) && (!fm || String(s.module)===fm)
      );
    }
    const today = todayISO();
    document.querySelector('#scheduleTable tbody').innerHTML = rows.map(s => {

  if(!isTrainer){

  }
  renderRows();
  document.getElementById('exportScheduleBtn').onclick = () => isTrainer ? exportTrainerScheduleExcel(ROLE.trainerName) : exportScheduleExcel();

    return `<div class="card trainer-card">

      </div>
      <div class="mt">
        <label>Email</label>
        <input data-tkey="${t.key}" data-field="email" class="tContact" value="${esc(contact.email||'')}" placeholder="email@example.com" ${isAdmin?'':'disabled'}/>
      </div>
    </div>`;
  }).join('');
  if(isAdmin){
    grid.querySelectorAll('.tContact').forEach(inp => {
      inp.onchange = () => {
        if(!STATE.trainerContacts) STATE.trainerContacts = {};
        const k = inp.dataset.tkey, f = inp.dataset.field;
        if(!STATE.trainerContacts[k]) STATE.trainerContacts[k] = {};
        STATE.trainerContacts[k][f] = inp.value;
        saveState(STATE);
      };
    });
  }
}

/* ================= STUDENTS ================= */
function renderStudents(){
  const el = document.getElementById('tab-students');
  const isAdmin = ROLE && ROLE.type==='admin';
  const myCity = ROLE && ROLE.type==='rep' ? ROLE.city : null;
  el.innerHTML = `
    <div class="topbar">
      <div><h1>Студенты</h1><div class="meta">${isAdmin ? 'Все города' : 'Город: '+esc(CITY_NAME[myCity])}</div></div>
      <button class="btn btn-primary" id="addStudentBtn">+ Добавить студента</button>
    </div>
    <div class="filter-row">
      ${isAdmin ? `<div><label>Город</label><select id="stCityFilter"><option value="">Все города</option>${STREAMS.map(s=>`<option value="${s.key}">${s.name}</option>`).join('')}</select></div>` : ''}
      <div><label>Статус</label><select id="stStatusFilter"><option value="">Любой статус</option><option value="lead">Лид</option><option value="confirmed">Подтверждён</option><option value="paid">Оплачено</option><option value="completed">Завершил</option></select></div>
    </div>
    <div class="tbl-wrap">
      <table id="studentsTable">
        <thead><tr><th>ФИО</th>${isAdmin?'<th>Город</th>':''}<th>Телефон</th><th>Статус</th><th>Прогресс модулей</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="grid grid-4 mt" id="studentAnalytics"></div>
  `;
  function renderRows(){
    const cf = isAdmin ? document.getElementById('stCityFilter').value : myCity;
    const sf = document.getElementById('stStatusFilter').value;
    const rows = STATE.students.filter(s => (!cf || s.city===cf) && (!sf || s.status===sf));
    document.querySelector('#studentsTable tbody').innerHTML = rows.map(s => {
      const done = (s.progress||[]).filter(Boolean).length;
      return `<tr>
        <td>${esc(s.name)}</td>
        ${isAdmin?`<td>${esc(CITY_NAME[s.city]||s.city)}</td>`:''}
        <td>${esc(s.phone)}</td>
        <td>${statusBadge(s.status)}</td>
        <td>${done}/8 <div class="progress" style="width:80px;display:inline-block;vertical-align:middle;margin-left:6px;"><div style="width:${done/8*100}%"></div></div></td>
        <td><button class="btn btn-sm btn-ghost editSt" data-id="${s.id}">Изм.</button> <button class="btn btn-sm btn-danger delSt" data-id="${s.id}">✕</button></td>
      </tr>`;
    }).join('') || '<tr><td colspan="6">Пока нет студентов — добавьте первого через кнопку выше.</td></tr>';
    document.querySelectorAll('.editSt').forEach(b=>b.onclick=()=>openStudentModal(b.dataset.id));
    document.querySelectorAll('.delSt').forEach(b=>b.onclick=()=>{
      if(confirm('Удалить студента из списка?')){
        STATE.students = STATE.students.filter(s=>s.id!==b.dataset.id);
        saveState(STATE); renderRows(); renderAnalytics();
      }
    });
  }
  function renderAnalytics(){
    const scope = isAdmin ? STATE.students : STATE.students.filter(s=>s.city===myCity);
    const total = scope.length;
    const paid = scope.filter(s=>['paid','completed'].includes(s.status)).length;
    const completed = scope.filter(s=>s.status==='completed').length;
    const avgProgress = total ? Math.round(scope.reduce((a,s)=>a+((s.progress||[]).filter(Boolean).length),0)/total/8*100) : 0;
    document.getElementById('studentAnalytics').innerHTML = `
      <div class="card stat"><div class="lbl">Всего студентов</div><div class="num">${total}</div></div>
      <div class="card stat"><div class="lbl">Оплатили</div><div class="num">${paid}</div></div>
      <div class="card stat"><div class="lbl">Завершили программу</div><div class="num">${completed}</div></div>
      <div class="card stat"><div class="lbl">Средний прогресс</div><div class="num">${avgProgress}%</div></div>
    `;
  }
  if(isAdmin) document.getElementById('stCityFilter').onchange = ()=>{renderRows();};
  document.getElementById('stStatusFilter').onchange = renderRows;
  document.getElementById('addStudentBtn').onclick = () => openStudentModal(null);
  renderRows(); renderAnalytics();
  window.__studentsRefresh = () => { renderRows(); renderAnalytics(); };
}
function statusBadge(st){
  const map = {lead:['Лид','badge-teal'], confirmed:['Подтверждён','badge-warn'], paid:['Оплачено','badge-ok'], completed:['Завершил','badge-gold']};
  const v = map[st] || ['Лид','badge-teal'];
  return `<span class="badge ${v[1]}">${v[0]}</span>`;
}
function openStudentModal(id){
  const isAdmin = ROLE && ROLE.type==='admin';
  const myCity = ROLE && ROLE.type==='rep' ? ROLE.city : null;
  const existing = id ? STATE.students.find(s=>s.id===id) : null;
  const overlay = document.getElementById('genericModal');
  overlay.innerHTML = `
    <div class="modal">
      <div class="flex-row" style="justify-content:space-between;"><h2>${existing?'Редактировать':'Новый'} студент</h2><span class="close-x" id="closeStModal">✕</span></div>

/* ================= EXCEL (SpreadsheetML XML, opens natively in Excel, no external libs) ================= */
function xmlEsc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ssCell(v){
  const isNum = typeof v === 'number';
  return `<Cell><Data ss:Type="${isNum?'Number':'String'}">${xmlEsc(v)}</Data></Cell>`;
}
function ssRow(cells){ return `<Row>${cells.map(ssCell).join('')}</Row>`; }
function ssWorksheet(name, headerRow, dataRows){
  return `<Worksheet ss:Name="${xmlEsc(name)}"><Table>
    ${ssRow(headerRow)}
    ${dataRows.map(ssRow).join('')}
  </Table></Worksheet>`;
}
function buildWorkbook(sheetsXml){
  return `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
 ${sheetsXml.join('\n')}
</Workbook>`;
}
function safeSheetName(name){
  // Excel sheet names: max 31 chars, no : \ / ? * [ ]
  return name.replace(/[:\\\/\?\*\[\]]/g,'').slice(0,31);
}
function exportScheduleExcel(){
  const header = ['Сессия','Дата начала','Дата окончания','Даты (текст)','День недели','Тренер'];
  const overviewHeader = ['Город','Сессия','Дата начала','Дата окончания','Даты (текст)','Тренер'];
  const overviewRows = SCHEDULE.map(s=>[s.city_name, s.label||('Модуль '+s.module), s.date_start, s.date_end, s.date_label, s.trainer]);
  const sheets = [ssWorksheet('Все города', overviewHeader, overviewRows)];
  STREAMS.forEach(s => {
    const rows = SCHEDULE.filter(x=>x.city===s.key).map(x=>[x.label||('Модуль '+x.module), x.date_start, x.date_end, x.date_label, x.weekday, x.trainer]);
    sheets.push(ssWorksheet(safeSheetName(s.name), header, rows));
  });
  const wb = buildWorkbook(sheets);
  downloadBlob('ICU_raspisanie_2026-2027_po_gorodam.xls', wb, 'application/vnd.ms-excel');
}

function exportFullExcel(){
  const cityHeader = ['Город','Цель набора','Зарегистрировано','Оплачено/завершили','Готовность %','Представитель','Телефон представителя','Email представителя'];
  const cityRows = STREAMS.map(s=>{
    const reg = STATE.students.filter(st=>st.city===s.key).length;
    const paid = STATE.students.filter(st=>st.city===s.key && ['paid','completed'].includes(st.status)).length;
    const rep = STATE.cities[s.key]||{};
    return [s.name, s.target, reg, paid, Math.round(reg/s.target*100), rep.rep_name||'', rep.rep_phone||'', rep.rep_email||''];
  });

  const trHeader = ['Тренер','Роль','Города','Сессий в 2026-27','Телефон','Email'];
  const bySessionCount = {};
  SCHEDULE.forEach(s => bySessionCount[s.trainer] = (bySessionCount[s.trainer]||0)+1);
  const trRows = TRAINERS.map(t=>{
    const c = (STATE.trainerContacts && STATE.trainerContacts[t.key]) || {};
    return [t.name, t.role, t.cities, bySessionCount[t.name]||0, c.phone||t.phone||'', c.email||t.email||''];
  });

  const schHeaderCity = ['Модуль','Дата начала','Дата окончания','Даты (текст)','День недели','Тренер'];
  const overviewHeader = ['Город','Модуль','Дата начала','Дата окончания','Даты (текст)','Тренер'];
  const overviewRows = SCHEDULE.map(s=>[s.city_name, 'Модуль '+s.module, s.date_start, s.date_end, s.date_label, s.trainer]);

  const stHeaderCity = ['ФИО','Телефон','Email','Статус','Пройдено модулей'];

  const sheets = [
    ssWorksheet('Готовность городов', cityHeader, cityRows),
    ssWorksheet('Тренеры', trHeader, trRows),
    ssWorksheet('Расписание — все города', overviewHeader, overviewRows),
  ];
  STREAMS.forEach(s => {
    const schRows = SCHEDULE.filter(x=>x.city===s.key).map(x=>['Модуль '+x.module, x.date_start, x.date_end, x.date_label, x.weekday, x.trainer]);
    const stRows = STATE.students.filter(st=>st.city===s.key).map(st=>[st.name, st.phone||'', st.email||'', st.status, (st.progress||[]).filter(Boolean).length]);
    sheets.push(ssWorksheet(safeSheetName(s.name+' расписание'), schHeaderCity, schRows));
    sheets.push(ssWorksheet(safeSheetName(s.name+' студенты'), stHeaderCity, stRows));
  });

  const wb = buildWorkbook(sheets);
  downloadBlob('ICU_polny_otchet_2026-2027_po_gorodam.xls', wb, 'application/vnd.ms-excel');
}

      }).filter(r=>r.phone||r.email);

      recipients = STATE.students.filter(s=>s.city===cityKey).map(s=>({name:s.name, city:CITY_NAME[cityKey], phone:s.phone, email:s.email, cityKey}));

    list.innerHTML = recipients.map(r => {
      const nextSess = SCHEDULE.find(s=>s.city===r.cityKey && s.date_start>=todayISO());
      const vars = {name:r.name, city:r.city, date: nextSess?nextSess.date_label:'—', trainer: nextSess?nextSess.trainer:'—'};
      const waText = fillTemplate(document.getElementById('waTpl').value, vars);
      const phoneDigits = digitsOnly(r.phone);
      const waLink = phoneDigits ? `https://wa.me/${phoneDigits}?text=${encodeURIComponent(waText)}` : null;
      const mailSubject = document.getElementById('emailSubject').value;
      const mailBody = fillTemplate(document.getElementById('emailTpl').value, vars);
      const mailLink = r.email ? `mailto:${encodeURIComponent(r.email)}?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}` : null;
      return `<div class="recipient-row">
        <div><b>${esc(r.name)}</b><div class="small">${esc(r.city)}${r.phone?' · '+esc(r.phone):''}${r.email?' · '+esc(r.email):''}</div></div>
        <div class="flex-row">
          ${waLink?`<a class="btn btn-sm btn-ghost" href="${waLink}" target="_blank">WhatsApp</a>`:''}
          ${mailLink?`<a class="btn btn-sm btn-ghost" href="${mailLink}" target="_blank">Email</a>`:''}
        </div>
      </div>`;
    }).join('');
  }
  audSel.onchange = renderRecipients;
  document.getElementById('waTpl').oninput = renderRecipients;
  document.getElementById('emailTpl').oninput = renderRecipients;
  document.getElementById('emailSubject').oninput = renderRecipients;

    if(bcCity){ bcCity.onchange = renderRecipients; if(!isAdmin) bcCity.disabled = true; }
  },0);
  document.getElementById('saveTplBtn').onclick = () => {

    STATE.msgTemplates.email = document.getElementById('emailTpl').value;
    saveState(STATE);
    alert('Шаблоны сохранены');
  };
  renderRecipients();
}

  const chart = document.getElementById('revenueChart');
  chart.innerHTML = STREAMS.map(s => {
    const reg = STATE.students.filter(st=>st.city===s.key).length;
    const potential = s.target * programPrice;
    const actual = reg * programPrice;
    const pct = Math.min(100, potential ? Math.round(actual/maxCityVal*100) : 0);
    const pctPotential = Math.round(potential/maxCityVal*100);
    return `<div class="mt">
      <div class="flex-row" style="justify-content:space-between;"><b>${esc(s.name)}</b><span class="small">${fmtTenge(actual)} / ${fmtTenge(potential)}</span></div>
      <div class="progress" style="position:relative;">
        <div style="width:${pctPotential}%; background:var(--teal-100);position:absolute;height:100%;"></div>
        <div style="width:${pct}%; position:relative;"></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('savePriceBtn').onclick = () => {
    const v = parseFloat(document.getElementById('priceInput').value);
    if(!v || v<=0){ alert('Укажите корректную цену'); return; }
    STATE.modulePrice = v; saveState(STATE);
    renderFinance();
  };
  // attendance folders
  const foldersEl = document.getElementById('attendanceFolders');
  foldersEl.innerHTML = STREAMS.map(s => {
    const modules = SCHEDULE.filter(x=>x.city===s.key);
    return `<div class="mt">
      <b>${esc(s.name)}</b>
      <div class="pill-toggle mt">
        ${modules.map(m => {
          const key = s.key+'_'+m.module+'_'+m.date_start;
          const att = STATE.attendance[key] || {};
          const presentCount = Object.values(att).filter(Boolean).length;
          return `<span class="pill attMod" data-key="${key}" data-city="${s.key}" data-label="${esc(m.label||('Модуль '+m.module))}" data-date="${m.date_label}">${(m.label||('Модуль '+m.module))} (${presentCount})</span>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  foldersEl.querySelectorAll('.attMod').forEach(p => {
    p.onclick = () => openAttendanceModal(p.dataset.city, p.dataset.key, p.dataset.label, p.dataset.date);
  });
  document.getElementById('dlAllAttendance').onclick = exportAttendanceExcel;
}
function openAttendanceModal(cityKey, key, label, dateLabel){
  const overlay = document.getElementById('genericModal');
  const students = STATE.students.filter(s=>s.city===cityKey);
  const att = STATE.attendance[key] || {};
  overlay.innerHTML = `
    <div class="modal">
      <div class="flex-row" style="justify-content:space-between;"><h2>${esc(label)}</h2><span class="close-x" id="closeAttModal">✕</span></div>
      <div class="small mb">${esc(CITY_NAME[cityKey])} · ${dateLabel}</div>
      ${students.length ? students.map(s => `
        <label class="flex-row" style="justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 0;">
          <span>${esc(s.name)}</span>
          <input type="checkbox" class="attCheck" data-id="${s.id}" ${att[s.id]?'checked':''} style="width:auto;"/>
        </label>
      `).join('') : '<div class="small">В этом городе пока нет студентов в списке.</div>'}
      <div class="flex-row mt">
        <button class="btn btn-primary" id="saveAttBtn">Сохранить</button>
        <button class="btn btn-ghost" id="cancelAttBtn">Отмена</button>
      </div>
    </div>`;
  overlay.style.display='flex';
  document.getElementById('closeAttModal').onclick = () => overlay.style.display='none';
  document.getElementById('cancelAttBtn').onclick = () => overlay.style.display='none';
  document.getElementById('saveAttBtn').onclick = () => {
    const result = {};
    overlay.querySelectorAll('.attCheck').forEach(c => { result[c.dataset.id] = c.checked; });
    STATE.attendance[key] = result;
    saveState(STATE);
    overlay.style.display='none';
    renderFinance();
  };
}
function exportAttendanceExcel(){
  const sheets = [];
  STREAMS.forEach(s => {
    const students = STATE.students.filter(st=>st.city===s.key);
    const modules = SCHEDULE.filter(x=>x.city===s.key);
    const header = ['ФИО', ...modules.map(m=>m.label||('Модуль '+m.module))];
    const rows = students.map(st => {
      const row = [st.name];
      modules.forEach(m => {
        const key = s.key+'_'+m.module+'_'+m.date_start;
        const att = STATE.attendance[key] || {};
        row.push(att[st.id] ? 'Присутствовал' : '—');
      });
      return row;
    });
    sheets.push(ssWorksheet(safeSheetName(s.name+' посещаемость'), header, rows));
  });
  const wb = buildWorkbook(sheets);
  downloadBlob('ICU_poseshaemost_2026-2027.xls', wb, 'application/vnd.ms-excel');
}

/* ================= FEEDBACK (QR + журнал) ================= */
function renderFeedback(){
  const el = document.getElementById('tab-feedback');
  const isAdmin = ROLE && ROLE.type==='admin';
  const myCity = ROLE && ROLE.type==='rep' ? ROLE.city : null;
  el.innerHTML = `
    <div class="topbar"><div><h1>Обратная связь от студентов</h1><div class="meta">QR-код для отзыва в WhatsApp + журнал полученных отзывов</div></div></div>
    <div class="grid grid-2">
      <div class="card">
        <h3>QR-код для отзыва</h3>
        <div>
          <label>Город</label>
          <select id="fbCity">${STREAMS.map(s=>`<option value="${s.key}" ${myCity===s.key?'selected':''}>${s.name}</option>`).join('')}</select>
        </div>
        <div id="fbQrWrap" class="mt" style="text-align:center;"></div>
        <div class="small mt">Студент сканирует код телефоном → открывается WhatsApp с готовым текстом отзыва, адресованным представителю города. Отправка — от аккаунта студента.</div>
      </div>
      <div class="card">
        <h3>Добавить отзыв вручную</h3>
        <label>Город</label>
        <select id="fbFormCity">${STREAMS.map(s=>`<option value="${s.key}" ${myCity===s.key?'selected':''}>${s.name}</option>`).join('')}</select>
        <label class="mt">Имя студента (необязательно)</label>
        <input id="fbName" placeholder="Можно оставить пустым — анонимно"/>
        <label class="mt">Оценка</label>
        <div class="pill-toggle" id="fbRating">${[1,2,3,4,5].map(i=>`<span class="pill" data-v="${i}">${'★'.repeat(i)}</span>`).join('')}</div>
        <label class="mt">Комментарий</label>
        <textarea id="fbComment" placeholder="Текст отзыва"></textarea>
        <button class="btn btn-primary mt" id="addFbBtn">Сохранить отзыв</button>
      </div>
    </div>
    <div class="card mt">
      <div class="section-title"><h3>Журнал отзывов</h3>${isAdmin?`<select id="fbFilterCity" style="max-width:220px;"><option value="">Все города</option>${STREAMS.map(s=>`<option value="${s.key}">${s.name}</option>`).join('')}</select>`:''}</div>
      <div id="fbList"></div>
    </div>
  `;
  function renderQr(){
    const cityKey = document.getElementById('fbCity').value;
    const rep = STATE.cities[cityKey] || {};
    const phone = digitsOnly(rep.rep_phone);
    const wrap = document.getElementById('fbQrWrap');
    if(!phone){
      wrap.innerHTML = `<div class="small">У города «${esc(CITY_NAME[cityKey])}» ещё не указан телефон представителя (вкладка «Города и роли») — QR нельзя сформировать.</div>`;
      return;
    }
    const text = `Отзыв ICU — ${CITY_NAME[cityKey]}: `;
    const link = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
    try{
      const qr = qrcode(0, 'M');
      qr.addData(link);
      qr.make();
      wrap.innerHTML = qr.createSvgTag({cellSize:5, margin:3}) + `<div class="small mt">${esc(link)}</div>`;
    }catch(e){
      wrap.innerHTML = `<div class="small">Не удалось построить QR: ${esc(e.message)}</div>`;
    }
  }
  document.getElementById('fbCity').onchange = renderQr;
  renderQr();

  let selectedRating = 0;
  document.querySelectorAll('#fbRating .pill').forEach(p => {
    p.onclick = () => {
      selectedRating = parseInt(p.dataset.v,10);
      document.querySelectorAll('#fbRating .pill').forEach(x=>x.classList.toggle('active', parseInt(x.dataset.v,10)<=selectedRating));
    };
  });
  document.getElementById('addFbBtn').onclick = () => {
    const comment = document.getElementById('fbComment').value.trim();
    if(!selectedRating && !comment){ alert('Укажите оценку или комментарий'); return; }
    STATE.feedback.push({
      id: uid(),
      city: document.getElementById('fbFormCity').value,
      name: document.getElementById('fbName').value.trim(),
      rating: selectedRating,
      comment,
      date: todayISO()
    });
    saveState(STATE);
    document.getElementById('fbComment').value='';
    document.getElementById('fbName').value='';
    selectedRating = 0;
    document.querySelectorAll('#fbRating .pill').forEach(x=>x.classList.remove('active'));
    renderList();
  };
  function renderList(){
    const filter = isAdmin && document.getElementById('fbFilterCity') ? document.getElementById('fbFilterCity').value : myCity;
    const items = STATE.feedback.filter(f => !filter || f.city===filter).slice().reverse();
    document.getElementById('fbList').innerHTML = items.map(f => `
      <div class="recipient-row" style="align-items:flex-start;">
        <div>
          <b>${esc(f.name||'Аноним')}</b> · ${esc(CITY_NAME[f.city]||f.city)} · ${f.date}
          ${f.rating?`<div>${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</div>`:''}
          ${f.comment?`<div class="small mt">${esc(f.comment)}</div>`:''}
        </div>
      </div>
    `).join('') || '<div class="small">Отзывов пока нет.</div>';
  }
  if(isAdmin && document.getElementById('fbFilterCity')) document.getElementById('fbFilterCity').onchange = renderList;
  renderList();
}

/* ================= CALENDAR (year, by city / by trainer) ================= */
const CAL_PALETTE = ['#146568','#C9A227','#B3452F','#3C7A5D','#5B6B6C','#8E5FB3','#2E6FA7','#C9772A','#4C8577','#A44B7A','#6B7FD7','#8A9A3B'];
const CAL_MONTHS_RU = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const CAL_WD_RU = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
function calColor(name, names){ return CAL_PALETTE[names.indexOf(name) % CAL_PALETTE.length]; }
function calDaysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function calFirstWeekday(y,m){ return (new Date(y,m-1,1).getDay()+6)%7; }
function calMonthRange(){
  const starts = SCHEDULE.map(s=>s.date_start).slice().sort();
  const ends = SCHEDULE.map(s=>s.date_end).slice().sort();
  let [y,m] = starts[0].split('-').map(Number);
  const [ey,em] = ends[ends.length-1].split('-').map(Number);
  const months=[];
  while(y<ey || (y===ey && m<=em)){ months.push([y,m]); m++; if(m>12){m=1;y++;} }
  return months;
}
function renderCalendar(){
  const el = document.getElementById('tab-calendar');
  const isTrainer = ROLE && ROLE.type==='trainer';
  if(!el.dataset.mode) el.dataset.mode = 'city';
  const mode = el.dataset.mode;
  el.innerHTML = `
    <div class="topbar">
      <div><h1>Календарь года 2026/27</h1><div class="meta">Все ${SCHEDULE.length} сессии по месяцам — переключите вид по городам или по тренерам</div></div>
    </div>
    <div class="cal-toggle pill-toggle">
      <div class="pill ${mode==='city'?'active':''}" id="calModeCity">По городам</div>
      <div class="pill ${mode==='trainer'?'active':''}" id="calModeTrainer">По тренерам</div>
    </div>
    <div id="calLegend" class="cal-legend"></div>
    <div id="calGrid" class="cal-grid"></div>
    <div id="calList"></div>
  `;
  document.getElementById('calModeCity').onclick = () => { el.dataset.mode='city'; renderCalendar(); };
  document.getElementById('calModeTrainer').onclick = () => { el.dataset.mode='trainer'; renderCalendar(); };

  const groupKey = mode==='city' ? 'city_name' : 'trainer';
  let names = mode==='city'
    ? STREAMS.map(s=>s.name)
    : Array.from(new Set(SCHEDULE.map(s=>s.trainer))).sort((a,b)=>a.localeCompare(b,'ru'));
  if(isTrainer) names = names.filter(n => mode==='trainer' ? n===ROLE.trainerName : true);
  const rowsSource = isTrainer ? SCHEDULE.filter(s=>s.trainer===ROLE.trainerName) : SCHEDULE;

  document.getElementById('calLegend').innerHTML = names.map(n=>`<div class="cal-legend-item"><span class="cal-legend-dot" style="background:${calColor(n,names)}"></span>${esc(n)}</div>`).join('');

  const byDate = {};
  rowsSource.forEach(s=>{
    let d = new Date(s.date_start+"T00:00:00");
    const end = new Date(s.date_end+"T00:00:00");
    while(d<=end){
      const iso = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      (byDate[iso] = byDate[iso]||[]).push(s);
      d.setDate(d.getDate()+1);
    }
  });

  document.getElementById('calGrid').innerHTML = calMonthRange().map(([y,m])=>{
    const dim = calDaysInMonth(y,m);
    const lead = calFirstWeekday(y,m);
    let cells = '';
    for(let i=0;i<lead;i++) cells += `<div class="cal-day empty"></div>`;
    for(let day=1; day<=dim; day++){
      const iso = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const sess = byDate[iso]||[];
      const dots = sess.map(s=>`<span class="dot" style="background:${calColor(s[groupKey],names)}"></span>`).join('');
      const title = sess.map(s=>`${s.city_name} · ${s.label||('Модуль '+s.module)} · ${s.trainer}`).join('\n');
      cells += `<div class="cal-day"${title?` title="${esc(title)}"`:''}>${day}<span class="dots">${dots}</span></div>`;
    }
    return `<div class="cal-month"><h4>${CAL_MONTHS_RU[m-1]} ${y}</h4><div class="cal-7col">${CAL_WD_RU.map(w=>`<div class="cal-wd">${w}</div>`).join('')}</div><div class="cal-7col">${cells}</div></div>`;
  }).join('');

  document.getElementById('calList').innerHTML = names.map(n=>{
    const rows = rowsSource.filter(s=>s[groupKey]===n).slice().sort((a,b)=>a.date_start.localeCompare(b.date_start));
    if(!rows.length) return '';
    return `<div class="card mb">
      <div class="flex-row" style="justify-content:space-between;">
        <h3><span class="cal-legend-dot" style="background:${calColor(n,names)};"></span> ${esc(n)}</h3>
        <span class="badge badge-teal">${rows.length} сесс.</span>
      </div>
      <div class="tbl-wrap mt"><table><thead><tr><th>${mode==='city'?'Тренер':'Город'}</th><th>Сессия</th><th>Даты</th></tr></thead><tbody>
        ${rows.map(s=>`<tr><td>${esc(mode==='city'?s.trainer:s.city_name)}</td><td>${s.label||('Модуль '+s.module)}</td><td>${s.date_label} ${s.date_start.slice(0,4)}</td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
  }).join('');
}

  const isAdmin = ROLE && ROLE.type==='admin';

  let last = 'dashboard';
  try{ last = localStorage.getItem('icu2026_lasttab') || 'dashboard'; }catch(e){}

}
